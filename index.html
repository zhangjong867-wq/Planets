<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная Солнечная Система</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            pointer-events: auto;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .legend {
            font-size: 0.8rem;
            color: #aaa;
        }

        .speed-control {
            margin-top: 10px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <div class="controls">
        <h1>Солнечная система</h1>
        <div class="legend">Масштабы планет и расстояния упрощены для наглядности</div>
        <div class="speed-control">
            Скорость: <input type="range" id="speedRange" min="0" max="5" step="0.1" value="1">
        </div>
    </div>
    <canvas id="solarCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('solarCanvas');
    const ctx = canvas.getContext('2d');
    const speedInput = document.getElementById('speedRange');

    let width, height;
    let speedMultiplier = 1;

    // Данные о планетах
    // Расстояние (distance), Радиус (radius), Цвет (color), Скорость (speed), Название (name)
    const planets = [
        { name: "Меркурий", dist: 60,  radius: 4,  color: "#A5A5A5", speed: 0.047, angle: Math.random() * Math.PI * 2 },
        { name: "Венера",   dist: 90,  radius: 7,  color: "#E3BB76", speed: 0.035, angle: Math.random() * Math.PI * 2 },
        { name: "Земля",    dist: 130, radius: 7.5,color: "#2271B3", speed: 0.029, angle: Math.random() * Math.PI * 2 },
        { name: "Марс",     dist: 170, radius: 5,  color: "#E27B58", speed: 0.024, angle: Math.random() * Math.PI * 2 },
        { name: "Юпитер",   dist: 240, radius: 18, color: "#D39C7E", speed: 0.013, angle: Math.random() * Math.PI * 2 },
        { name: "Сатурн",   dist: 310, radius: 15, color: "#C5AB6E", speed: 0.009, angle: Math.random() * Math.PI * 2, hasRing: true },
        { name: "Уран",     dist: 370, radius: 10, color: "#BBE1E4", speed: 0.006, angle: Math.random() * Math.PI * 2 },
        { name: "Нептун",   dist: 420, radius: 10, color: "#6081FF", speed: 0.005, angle: Math.random() * Math.PI * 2 }
    ];

    // Звезды на фоне
    const stars = [];
    function createStars() {
        stars.length = 0;
        for (let i = 0; i < 400; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 1.5,
                opacity: Math.random()
            });
        }
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        createStars();
    }

    window.addEventListener('resize', resize);
    resize();

    function draw() {
        // Очистка экрана
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, width, height);

        const centerX = width / 2;
        const centerY = height / 2;

        // Рисуем звезды
        ctx.fillStyle = "white";
        stars.forEach(star => {
            ctx.globalAlpha = star.opacity;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Солнце
        const sunGradient = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 40);
        sunGradient.addColorStop(0, "#FFF5F2");
        sunGradient.addColorStop(0.2, "#FFD200");
        sunGradient.addColorStop(0.5, "#F7941E");
        sunGradient.addColorStop(1, "transparent");

        ctx.fillStyle = sunGradient;
        ctx.beginPath();
        ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
        ctx.fill();
        
        // Добавим свечение Солнцу
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#F7941E";
        ctx.beginPath();
        ctx.arc(centerX, centerY, 25, 0, Math.PI * 2);
        ctx.fillStyle = "#FFCC00";
        ctx.fill();
        ctx.shadowBlur = 0;

        // Обновление множителя скорости
        speedMultiplier = parseFloat(speedInput.value);

        // Планеты
        planets.forEach(planet => {
            // Рисуем орбиту
            ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
            ctx.beginPath();
            ctx.arc(centerX, centerY, planet.dist, 0, Math.PI * 2);
            ctx.stroke();

            // Вычисляем позицию планеты
            const x = centerX + Math.cos(planet.angle) * planet.dist;
            const y = centerY + Math.sin(planet.angle) * planet.dist;

            // Рисуем планету
            ctx.fillStyle = planet.color;
            ctx.beginPath();
            ctx.arc(x, y, planet.radius, 0, Math.PI * 2);
            ctx.fill();

            // Рисуем кольца (для Сатурна)
            if (planet.hasRing) {
                ctx.strokeStyle = "rgba(197, 171, 110, 0.5)";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(x, y, planet.radius * 2.2, planet.radius * 0.8, planet.angle, 0, Math.PI * 2);
                ctx.stroke();
                ctx.lineWidth = 1;
            }

            // Название планеты
            ctx.fillStyle = "white";
            ctx.font = "10px Arial";
            ctx.textAlign = "center";
            ctx.fillText(planet.name, x, y + planet.radius + 15);

            // Обновляем угол (вращение)
            planet.angle += planet.speed * speedMultiplier;
        });

        requestAnimationFrame(draw);
    }

    // Запуск анимации после загрузки
    window.onload = () => {
        draw();
    };
</script>

</body>
</html>
